<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ljubljana 42K">
<meta name="theme-color" content="#8DC63F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<title>Ljubljana 42K</title>
<style>
  :root {
    --black:#0d0d0d; --dark:#111; --card:#181818; --card2:#1e1e1e;
    --white:#ffffff;
    --gray:#aaaaaa;
    --gray-dim:#666;
    --green:#8DC63F; --green-dark:#6fa832;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{
    background:var(--black);color:var(--white);
    font-family:'DM Sans',sans-serif;font-weight:400;
    padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
  }

  /* INSTALL BANNER */
  #install-banner{
    display:none;position:fixed;bottom:calc(16px + var(--safe-bottom));
    left:16px;right:16px;z-index:999;
    background:#1a1a1a;border:1px solid var(--green);
    border-radius:14px;padding:16px 18px;
    box-shadow:0 8px 32px rgba(0,0,0,0.7);
    align-items:center;gap:12px;
  }
  #install-banner.show{display:flex;}
  #install-banner p{flex:1;font-size:13px;color:#ddd;line-height:1.5;}
  #install-banner p strong{color:#fff;display:block;margin-bottom:2px;}
  .install-btn{background:var(--green);color:#000;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .dismiss-btn{background:transparent;border:none;color:#666;font-size:22px;cursor:pointer;padding:2px;}

  /* HERO */
  .hero{position:relative;overflow:hidden;background:#0a0a0a;border-bottom:3px solid var(--green);}
  .hero-img{width:100%;height:100px;object-fit:cover;display:block;opacity:0.4;filter:grayscale(20%) contrast(1.1);}
  .hero-overlay{
    position:absolute;inset:0;
    background:linear-gradient(to bottom, rgba(13,13,13,0.3) 0%, rgba(13,13,13,0.8) 100%);
    display:flex;flex-direction:row;align-items:center;justify-content:flex-start;
    padding:14px 18px;gap:14px;
  }
  .hero-icon{height:64px;width:64px;border-radius:50%;object-fit:cover;border:2px solid var(--green);flex-shrink:0;}
  .hero-text-block{display:flex;flex-direction:column;justify-content:center;}
  .hero-logo{height:28px;filter:brightness(0) invert(1);opacity:0.95;display:block;margin-bottom:4px;}
  .hero-sub{font-size:10px;letter-spacing:2px;color:#ccc;text-transform:uppercase;}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:#fff;letter-spacing:1px;}
  .hero-title span{color:var(--green);}

  /* STATS */
  .stats-row{display:flex;background:var(--dark);border-bottom:1px solid #222;}
  .stat-cell{flex:1;padding:12px 6px;text-align:center;border-right:1px solid #222;}
  .stat-cell:last-child{border-right:none;}
  .stat-cell .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);line-height:1;}
  .stat-cell .l{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}

  /* GLOBAL BAR */
  .global-wrap{padding:12px 20px;background:var(--dark);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .g-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#aaa;white-space:nowrap;}
  .g-bar-out{flex:1;min-width:80px;height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden;}
  .g-bar-in{height:100%;background:linear-gradient(90deg,var(--green-dark),var(--green));border-radius:3px;transition:width 0.4s ease;}
  .g-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);min-width:44px;text-align:right;line-height:1;}
  .g-km{font-size:12px;color:#aaa;white-space:nowrap;}
  .g-km span{color:#fff;font-weight:600;}
  .reset-btn{background:transparent;border:1px solid #333;color:#666;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;}
  .reset-btn:active{border-color:#666;color:#aaa;}

  /* LEGEND */
  .legend{display:flex;gap:10px;flex-wrap:wrap;padding:10px 20px;background:var(--dark);border-bottom:1px solid #1a1a1a;}
  .li{display:flex;align-items:center;gap:5px;font-size:10px;color:#ccc;text-transform:uppercase;letter-spacing:0.8px;}
  .ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  /* PHASES */
  .phase-hdr{padding:20px 20px 10px;display:flex;align-items:center;gap:12px;border-top:1px solid #181818;}
  .ph-num{font-family:'Bebas Neue',sans-serif;font-size:34px;color:#222;line-height:1;}
  .ph-info h2{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:#fff;}
  .ph-info p{font-size:10px;color:#aaa;margin-top:2px;}
  .ph-bar{height:2px;margin:0 20px 16px;border-radius:2px;}

  /* WEEKS */
  .weeks{display:flex;flex-direction:column;gap:10px;padding:0 20px 20px;}
  .week-card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid #222;}
  .week-card.complete{border-color:rgba(141,198,63,0.4);}
  .week-card.race-week{border-color:var(--green);box-shadow:0 0 20px rgba(141,198,63,0.12);}

  .wk-head{padding:11px 14px;background:#1e1e1e;display:flex;justify-content:space-between;align-items:center;}
  .wk-left .wn{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:#bbb;text-transform:uppercase;}
  .wk-left .wd{font-size:10px;color:#555;margin-top:1px;}
  .wk-right{display:flex;align-items:center;gap:8px;}
  .wk-km-track{text-align:right;}
  .km-line{display:flex;align-items:baseline;gap:3px;justify-content:flex-end;}
  .km-done{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);line-height:1;transition:color 0.2s;}
  .km-done.zero{color:#333;}
  .km-sep{font-size:11px;color:#444;}
  .km-total-val{font-family:'Bebas Neue',sans-serif;font-size:15px;color:#555;line-height:1;}
  .km-unit{font-size:10px;color:#444;margin-left:1px;}
  .wk-prog-bar{width:50px;height:3px;background:#2a2a2a;border-radius:2px;overflow:hidden;margin-top:4px;}
  .wk-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;}

  /* DAYS */
  .wk-body{padding:6px 14px 12px;}
  .day-row{
    display:flex;align-items:center;gap:8px;
    padding:9px 5px;border-bottom:1px solid #202020;
    cursor:pointer;border-radius:6px;
    -webkit-user-select:none;user-select:none;
    transition:background 0.1s;
  }
  .day-row:last-child{border-bottom:none;}
  .day-row:active:not(.rest){background:rgba(141,198,63,0.06);}
  .day-row.rest{cursor:default;opacity:0.3;}

  .chk-wrap{flex-shrink:0;width:22px;height:22px;position:relative;}
  .chk-wrap input[type=checkbox]{opacity:0;position:absolute;width:100%;height:100%;cursor:pointer;z-index:2;margin:0;}
  .chk-box{width:22px;height:22px;border:1.5px solid #333;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:transparent;pointer-events:none;}
  .chk-wrap input:checked ~ .chk-box{background:var(--green);border-color:var(--green);}
  .chk-wrap input:checked ~ .chk-box::after{content:'';display:block;width:5px;height:9px;border:2px solid #000;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}

  .day-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#bbb;min-width:26px;font-weight:500;}
  .day-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;}
  .pill-s{background:rgba(141,198,63,0.15);color:#a8d96e;}
  .pill-f{background:rgba(141,198,63,0.28);color:#c5eb8a;}
  .pill-r{background:rgba(255,100,50,0.18);color:#ff8c6a;}
  .pill-t{background:rgba(255,200,50,0.18);color:#ffd060;}
  .pill-e{background:rgba(80,180,255,0.18);color:#80caff;}
  .pill-x{background:rgba(60,60,60,0.25);color:#444;font-size:10px;}
  .pill-race{background:rgba(141,198,63,0.3);color:var(--green);font-weight:700;}

  /* KEY: white text for descriptions */
  .day-desc{font-size:11.5px;color:#ffffff;flex:1;line-height:1.45;min-width:0;font-weight:400;}
  .day-km-badge{font-family:'Bebas Neue',sans-serif;font-size:13px;color:#555;white-space:nowrap;flex-shrink:0;transition:color 0.2s;}
  .day-row.checked .day-km-badge{color:var(--green);}
  .day-row.checked .day-desc{color:#555;text-decoration:line-through;text-decoration-color:#333;}
  .day-row.checked .day-label{color:#333;}

  .rec-badge{display:inline-block;background:rgba(255,200,50,0.1);color:#ffd060;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:1px 5px;border-radius:3px;border:1px solid rgba(255,200,50,0.2);margin-left:6px;}

  /* CITY BANNERS */
  .city-banner{margin:4px 20px 20px;border-radius:12px;overflow:hidden;position:relative;height:110px;}
  .city-banner-img{width:100%;height:100%;object-fit:cover;display:block;}
  .city-banner-overlay{
    position:absolute;inset:0;
    background:linear-gradient(90deg,rgba(13,13,13,0.82) 0%,rgba(13,13,13,0.3) 100%);
    display:flex;align-items:center;padding:0 20px;
  }
  .city-banner-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;line-height:1.3;}
  .city-banner-text span{color:var(--green);}

  /* FOOTER */
  footer{padding:20px 20px calc(20px + var(--safe-bottom));border-top:1px solid #181818;text-align:center;}
  .footer-logo{height:28px;margin:0 auto 10px;filter:brightness(0) invert(1);opacity:0.2;display:block;}
  footer p{font-size:10px;color:#333;margin-bottom:4px;}
  footer .goal{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--green);letter-spacing:2px;}

  /* DARK/LIGHT MODE TOGGLE */
  .theme-btn{
    background:transparent;border:1px solid #333;color:#888;
    font-size:16px;padding:5px 9px;border-radius:6px;cursor:pointer;
    line-height:1;flex-shrink:0;
  }
  .theme-btn:active{border-color:#666;}

  /* LIGHT MODE */
  body.light{
    background:#f5f5f5;color:#111;
  }
  body.light .hero{background:#e8e8e8;}
  body.light .hero-overlay{background:linear-gradient(to bottom,rgba(240,240,240,0.1) 0%,rgba(240,240,240,0.7) 60%,#f5f5f5 100%);}
  body.light .hero-title{color:#111;}
  body.light .hero-logo{filter:none;opacity:1;}
  body.light .hero-sub{color:#444;}
  body.light .stats-row{background:#ececec;border-color:#ddd;}
  body.light .stat-cell{border-color:#ddd;}
  body.light .stat-cell .l{color:#666;}
  body.light .global-wrap{background:#ececec;border-color:#ddd;}
  body.light .g-label{color:#666;}
  body.light .g-bar-out{background:#ddd;}
  body.light .g-km{color:#666;}
  body.light .g-km span{color:#111;}
  body.light .reset-btn{border-color:#ccc;color:#888;}
  body.light .theme-btn{border-color:#ccc;color:#555;}
  body.light .legend{background:#ececec;border-color:#ddd;}
  body.light .li{color:#555;}
  body.light .phase-hdr{border-color:#ddd;}
  body.light .ph-num{color:#ddd;}
  body.light .ph-info h2{color:#111;}
  body.light .ph-info p{color:#666;}
  body.light .week-card{background:#fff;border-color:#e0e0e0;}
  body.light .week-card.complete{border-color:rgba(141,198,63,0.6);}
  body.light .wk-head{background:#f0f0f0;}
  body.light .wk-left .wn{color:#555;}
  body.light .wk-left .wd{color:#aaa;}
  body.light .km-sep{color:#bbb;}
  body.light .km-total-val{color:#aaa;}
  body.light .km-unit{color:#bbb;}
  body.light .km-done.zero{color:#ccc;}
  body.light .wk-prog-bar{background:#e0e0e0;}
  body.light .collapse-btn{color:#888;border-color:#ddd;}
  body.light .day-row{border-color:#f0f0f0;}
  body.light .day-row:active:not(.rest){background:rgba(141,198,63,0.08);}
  body.light .day-row.rest{opacity:0.4;}
  body.light .day-label{color:#888;}
  body.light .day-desc{color:#111 !important;}
  body.light .day-row.checked .day-desc{color:#bbb !important;}
  body.light .day-row.checked .day-label{color:#ccc;}
  body.light .chk-box{border-color:#ccc;}
  body.light .pill-x{background:rgba(0,0,0,0.06);color:#aaa;}
  body.light .day-km-badge{color:#bbb;}
  body.light .city-banner-overlay{background:linear-gradient(90deg,rgba(245,245,245,0.85) 0%,rgba(245,245,245,0.2) 100%);}
  body.light .city-banner-text{color:#111;}
  body.light footer{border-color:#ddd;}
  body.light footer p{color:#bbb;}
  body.light .footer-logo{filter:none;opacity:0.15;}
  body.light #install-banner{background:#fff;border-color:var(--green);}
  body.light #install-banner p{color:#444;}
  body.light #install-banner p strong{color:#111;}

  /* COLLAPSE */
  .wk-body{padding:6px 14px 12px;transition:all 0.2s;}
  .week-card.collapsed .wk-body{display:none;}
  .collapse-btn{
    background:transparent;border:1px solid #333;color:#666;
    font-size:11px;padding:3px 7px;border-radius:5px;cursor:pointer;
    line-height:1;flex-shrink:0;transition:transform 0.2s;
  }
  .week-card.collapsed .collapse-btn{transform:rotate(-90deg);}
</style>
</head>
<body>

<div id="install-banner">
  <p><strong>Instalar app</strong>Guardala en tu pantalla de inicio.</p>
  <button class="install-btn" id="install-btn">Instalar</button>

<div class="hero">

    src="https://ljubljanskimaraton.si/enupload/gallery/667/maraton1.gif"

      <div class="hero-sub">Heineken 0.0 Marathon · Ljubljana · 18 Oct 2026</div>

  <div class="stat-cell"><div class="n" id="stat-km-done">0</div><div class="l">km hechos</div></div>

  <div class="stat-cell"><div class="n" id="stat-sessions">0/0</div><div class="l">sesiones</div></div>
  <div class="stat-cell"><div class="n">20</div><div class="l">semanas</div></div>
</div>

<div class="global-wrap">
  <div class="g-label">Progreso</div>
  <div class="g-bar-out"><div class="g-bar-in" id="global-fill" style="width:0%"></div></div>

<div id="plan"></div>

<footer>
  <img class="footer-logo"
    src="https://ljubljanskimaraton.si/images/nlb-lj-maraton_logop.svg"
    onerror="this.style.display='none'" alt="">
  <p>Progreso guardado en tu dispositivo · Funciona offline</p>
  <div class="goal">18 OCT 2026 · LJUBLJANA · ≤ 3:08:00</div>
</footer>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

let deferredPrompt=null;
const banner=document.getElementById('install-banner');
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem('pwa-dismissed')) banner.classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==='accepted') banner.classList.remove('show');
  deferredPrompt=null;
});
document.getElementById('dismiss-btn').addEventListener('click',()=>{
  banner.classList.remove('show');
  localStorage.setItem('pwa-dismissed','1');
});

const STORAGE_KEY='tracker_ljubljana_2026_v2';

// City banners between phases - using Wikimedia Commons reliable URLs
const cityBanners=[
  {
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Ljubljana_Triple_Bridge_at_night.jpg/800px-Ljubljana_Triple_Bridge_at_night.jpg',
    label:'TROMOSTOVJE · <span>TRIPLE BRIDGE</span>'
  },
  {
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Ljubljana_-_Old_Town_%28Staro_Mesto%29.jpg/800px-Ljubljana_-_Old_Town_%28Staro_Mesto%29.jpg',
    label:'<span>STARI TRG</span> · OLD TOWN'
  },
  {
    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Ljubljana_castle_%282%29.jpg/800px-Ljubljana_castle_%282%29.jpg',
    label:'<span>LJUBLJANSKI GRAD</span> · CASTLE'
  },
];

const phases=[
  {num:'01',name:'BASE AERÓBICA',desc:'Semanas 1–5 · Jun 2 – Jul 6 · 40→55 km/sem',bar:'linear-gradient(90deg,#2d5a1b,#1a3a5c)',weeks:[
    {n:'Semana 1',d:'2–8 Jun',km:42,recovery:false,days:[
      {day:'Lun',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Mar',type:'t',pill:'pill-s',label:'Suave',desc:'10 km a 5:50–6:00 min/km',km:10},
      {day:'Mié',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Jue',type:'t',pill:'pill-t',label:'Tempo',desc:'10 km: 2 cal + 6 km a 4:45 + 2 vuelta',km:10},
      {day:'Vie',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Sáb',type:'t',pill:'pill-s',label:'Suave',desc:'10 km regenerativo a 6:00',km:10},
      {day:'Dom',type:'t',pill:'pill-f',label:'Fondo',desc:'12 km a 5:45–6:00 min/km',km:12},
    ]},
    {n:'Semana 2',d:'9–15 Jun',km:46,recovery:false,days:[
      {day:'Lun',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Mar',type:'t',pill:'pill-s',label:'Suave',desc:'10 km a 5:50 min/km',km:10},
      {day:'Mié',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Jue',type:'t',pill:'pill-r',label:'Series',desc:'12 km: 2+2 cal/vuelta + 5×1.000m a 4:20 (rec. 90s)',km:12},
      {day:'Vie',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Sáb',type:'t',pill:'pill-s',label:'Suave',desc:'10 km a 5:50–6:00 min/km',km:10},
      {day:'Dom',type:'t',pill:'pill-f',label:'Fondo',desc:'14 km a 5:45 min/km',km:14},
    ]},
    {n:'Semana 3',d:'16–22 Jun',km:50,recovery:false,days:[
      {day:'Lun',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Mar',type:'t',pill:'pill-s',label:'Suave',desc:'12 km a 5:50 min/km',km:12},
      {day:'Mié',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Jue',type:'t',pill:'pill-t',label:'Tempo',desc:'12 km: 2 cal + 8 km a 4:40 + 2 vuelta',km:12},
      {day:'Vie',type:'x',pill:'pill-x',label:'Descanso',desc:'',km:0},
      {day:'Sáb',type:'t',pill:'pill-s',label:'Suave',desc:'10 km regenerativo',km:10},

let state={};
const SKEY=(w,d)=>`w${w}_d${d}`;
function loadState(){try{state=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){state={};}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function resetAll(){
  if(!confirm('¿Resetear todo el progreso?')) return;
  state={};saveState();
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
  document.querySelectorAll('.day-row').forEach(r=>r.classList.remove('checked'));
  updateAll();
}
function fmt(v){return v%1===0?v:v.toFixed(1);}

function updateAll(){
  let tKm=0,dKm=0,tS=0,dS=0,wIdx=0;
  phases.forEach(ph=>{
    ph.weeks.forEach(wk=>{
      let wT=0,wD=0;
      wk.days.forEach((day,dIdx)=>{
        if(day.type!=='x'){
          wT+=day.km;tKm+=day.km;tS++;
          if(state[SKEY(wIdx,dIdx)]){wD+=day.km;dKm+=day.km;dS++;}
        }
      });
      const card=document.getElementById(`wk-${wIdx}`);
      if(card){
        const pct=wT?Math.round(wD/wT*100):0;
        card.querySelector('.wk-prog-fill').style.width=pct+'%';
        const el=card.querySelector('.km-done');
        el.textContent=fmt(wD);
        el.className='km-done'+(wD===0?' zero':'');
        if(pct===100) card.classList.add('complete'); else card.classList.remove('complete');
      }
      wIdx++;
    });
  });
  const pct=tKm?Math.round(dKm/tKm*100):0;
  document.getElementById('global-fill').style.width=pct+'%';
  document.getElementById('global-pct').textContent=pct+'%';
  document.getElementById('g-km-done').textContent=fmt(dKm);
  document.getElementById('g-km-total').textContent=fmt(tKm);
  document.getElementById('stat-km-done').textContent=fmt(dKm);
  document.getElementById('stat-km-total').textContent=fmt(tKm);
  document.getElementById('stat-sessions').textContent=`${dS}/${tS}`;
}

function render(){
  loadState();
  const container=document.getElementById('plan');
  let wIdx=0,html='';
  phases.forEach((ph,phIdx)=>{
    html+=`<div class="phase-hdr"><div class="ph-num">${ph.num}</div><div class="ph-info"><h2>${ph.name}</h2><p>${ph.desc}</p></div></div>
    <div class="ph-bar" style="background:${ph.bar};margin:0 20px 16px;"></div>
    <div class="weeks">`;
    ph.weeks.forEach(wk=>{
      const isRace=wk.race||false;
      html+=`<div class="week-card${isRace?' race-week':''}" id="wk-${wIdx}">
        <div class="wk-head">
          <div class="wk-left">
            <div class="wn">${wk.n}${wk.recovery?`<span class="rec-badge">↓ Recovery</span>`:''}</div>
            <div class="wd">${wk.d}</div>
          </div>
          <div class="wk-right">
            <div class="wk-km-track">
              <div class="km-line">
                <span class="km-done zero">0</span>
                <span class="km-sep">/</span>
                <span class="km-total-val">${wk.km}</span>
                <span class="km-unit">km</span>
              </div>
              <div class="wk-prog-bar"><div class="wk-prog-fill" style="width:0%"></div></div>
            </div>
            <button class="collapse-btn" onclick="toggleWeek(${wIdx},event)" title="Colapsar/expandir">▼</button>
          </div>
        </div>
        <div class="wk-body">`;
      wk.days.forEach((day,dIdx)=>{
        const key=SKEY(wIdx,dIdx);
        const checked=!!state[key];
        const isRest=day.type==='x';
        html+=`<div class="day-row${isRest?' rest':''}${checked?' checked':''}" id="row-${wIdx}-${dIdx}" ${!isRest?`onclick="toggle(${wIdx},${dIdx})"`:''}>`;
        if(!isRest){
          html+=`<div class="chk-wrap"><input type="checkbox" id="cb-${wIdx}-${dIdx}" ${checked?'checked':''} onchange="toggle(${wIdx},${dIdx})" onclick="event.stopPropagation()"><div class="chk-box"></div></div>`;
        } else {
          html+=`<div style="width:22px;flex-shrink:0"></div>`;
        }
        html+=`<div class="day-label">${day.day}</div>
          <span class="day-pill ${day.pill}">${day.label}</span>
          ${day.desc?`<div class="day-desc">${day.desc}</div>`:''}
          ${day.km>0?`<div class="day-km-badge">${fmt(day.km)} km</div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
      wIdx++;
    });
    // City photo banner between phases
    if(phIdx < phases.length-1){
      const b=cityBanners[phIdx%cityBanners.length];
      html+=`</div><div class="city-banner">
        <img class="city-banner-img" src="${b.img}" loading="lazy"
          onerror="this.parentElement.style.display='none'" alt="Ljubljana">
        <div class="city-banner-overlay">
          <div class="city-banner-text">${b.label}</div>
        </div>
      </div>`;
    } else {
      html+=`</div>`;
    }
  });
  container.innerHTML=html;
  updateAll();
}

function toggle(wIdx,dIdx){
  const key=SKEY(wIdx,dIdx);
  state[key]=!state[key];
  saveState();
  const cb=document.getElementById(`cb-${wIdx}-${dIdx}`);
  const row=document.getElementById(`row-${wIdx}-${dIdx}`);
  if(cb) cb.checked=state[key];
  if(row){if(state[key]) row.classList.add('checked'); else row.classList.remove('checked');}
  updateAll();
}

// ── THEME ────────────────────────────────────────────────────
function toggleTheme(){
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
}
function loadTheme(){
  if(localStorage.getItem('theme')==='light'){
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent='🌙';
  }
}

// ── COLLAPSE ─────────────────────────────────────────────────
function toggleWeek(wIdx, e){
  e.stopPropagation();
  const card = document.getElementById(`wk-${wIdx}`);
  const isCollapsed = card.classList.toggle('collapsed');
  const cState = JSON.parse(localStorage.getItem('collapse_state')||'{}');
  // false = explicitly expanded, true = collapsed
  cState[wIdx] = isCollapsed ? true : false;
  localStorage.setItem('collapse_state', JSON.stringify(cState));
}
function loadCollapseState(){
  const cState = JSON.parse(localStorage.getItem('collapse_state')||'{}');
  // Count total weeks
  let totalWeeks = 0;
  phases.forEach(ph => totalWeeks += ph.weeks.length);
  for(let i = 0; i < totalWeeks; i++){
    const card = document.getElementById(`wk-${i}`);
    if(!card) continue;
    // collapsed by default unless user explicitly expanded (false in cState)
    if(cState[i] === false){
      card.classList.remove('collapsed');
    } else {
      card.classList.add('collapsed');
    }
  }
}

render();
loadTheme();
loadCollapseState();
